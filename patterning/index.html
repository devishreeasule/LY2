<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Patterning · LY2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', 'Trebuchet MS', Arial, sans-serif;
      background: linear-gradient(135deg, #fce4ec 0%, #e8f5e9 50%, #e3f2fd 100%);
      height: 100vh; height: 100dvh;
      display: flex; align-items: stretch; justify-content: center;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }

    #intro-screen {
      position: fixed; inset: 0;
      background: linear-gradient(160deg, #4a148c, #7b1fa2, #ab47bc);
      display: flex; align-items: center; justify-content: center;
      border: 5px solid #FFD700; z-index: 200; cursor: pointer;
    }
    #intro-logo { width: 220px; height: auto; filter: drop-shadow(0 6px 20px rgba(0,0,0,0.5)); animation: logoBounce 2s ease-in-out infinite; cursor: pointer; }
    @keyframes logoBounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

    #game-screen {
      display: none; flex-direction: column;
      width: 100%; max-width: 860px; height: 100%; padding: 14px 14px 80px;
      overflow-y: auto;
    }

    .hdr { display:flex; align-items:center; justify-content:space-between; background:white; border-radius:18px; padding:10px 18px; margin-bottom:12px; box-shadow:0 4px 14px rgba(0,0,0,0.1); flex-shrink:0; }
    .hdr-score { font-size:1.2em; font-weight:bold; color:#4CAF50; min-width:70px; }
    .hdr-title { font-size:clamp(0.75em,2.5vw,1em); color:#6a0dad; font-weight:bold; text-align:center; }
    .mute-btn { width:38px; height:38px; border:2px solid #ddd; border-radius:50%; background:white; font-size:1.1em; cursor:pointer; display:flex; align-items:center; justify-content:center; }

    .progress-row { display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-shrink:0; }
    .progress-label { font-size:0.9em; color:#777; white-space:nowrap; }
    .progress-bar-wrap { flex:1; height:10px; background:#e0e0e0; border-radius:5px; overflow:hidden; }
    .progress-bar-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#4CAF50,#8BC34A); transition:width 0.5s ease; }

    .instruction { text-align:center; font-size:clamp(1em,3.5vw,1.2em); color:#333; font-weight:800; margin-bottom:14px; padding:0 8px; line-height:1.4; flex-shrink:0; }

    .q-card {
      background: white; border-radius: 24px; padding: 24px 16px 20px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.1);
      display: flex; flex-direction: column; align-items: center; gap: 24px;
      margin-top: auto; margin-bottom: auto; flex-shrink: 0; width: 100%;
    }

    .pattern-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; width: 100%;
    }

    .pattern-item {
      flex: 1; max-width: 130px;
      display: flex; flex-direction: column; align-items: center;
    }

    .shape-wrap {
      width: 100%; aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f5; border-radius: 16px; padding: 10px;
    }
    .shape-wrap svg { width: 100%; height: 100%; }

    .shape-wrap.empty {
      border: 3px dashed #bbb;
      background: #fafafa;
    }
    .shape-wrap.correct-anim { animation: popCorrect 0.4s ease; }
    .shape-wrap.wrong-anim   { animation: shakeWrong 0.4s ease; }

    @keyframes popCorrect { 0%{transform:scale(1)} 50%{transform:scale(1.12)} 100%{transform:scale(1)} }
    @keyframes shakeWrong { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

    .colour-choices { display:flex; gap:12px; width:100%; justify-content:center; }

    .colour-btn {
      flex: 1; max-width: 140px; height: 72px;
      border: 4px solid transparent; border-radius: 18px;
      font-size: clamp(0.82em,2.8vw,1em); font-weight: 800; font-family: inherit;
      cursor: pointer; color: white; letter-spacing: 0.02em;
      box-shadow: 0 4px 14px rgba(0,0,0,0.2);
      transition: transform 0.1s, border-color 0.2s;
      will-change: transform;
    }
    .colour-btn:active { transform: scale(0.93); }
    .colour-btn.wrong   { border-color: #f44336; animation: shakeWrong 0.4s ease; }
    .colour-btn.hint    { border-color: #FFD700; animation: pulseHint 1s ease-in-out infinite; }
    .colour-btn.correct { border-color: #4CAF50; box-shadow: 0 0 0 5px #4CAF5040; }

    @keyframes pulseHint { 0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,0.6)} 50%{box-shadow:0 0 0 14px rgba(255,215,0,0)} }

    .bottom-row { display:flex; justify-content:center; position:fixed; bottom:16px; left:0; right:0; z-index:50; pointer-events:none; }
    .btn-restart { pointer-events:all; background:linear-gradient(135deg,#FF9800,#F57C00); color:white; border:none; padding:12px 32px; border-radius:40px; font-size:1em; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 5px 14px rgba(255,152,0,0.4); }

    #toast { position:fixed; top:18%; left:50%; transform:translateX(-50%) scale(0.7); padding:14px 30px; border-radius:50px; font-size:1.5em; font-weight:bold; color:white; pointer-events:none; opacity:0; transition:opacity 0.2s,transform 0.2s; z-index:500; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,0.2); will-change:transform,opacity; }
    #toast.show { opacity:1; transform:translateX(-50%) scale(1); }

    .confetti { position:fixed; pointer-events:none; z-index:9998; border-radius:2px; }

    #end-screen { display:none; position:fixed; inset:0; background:linear-gradient(160deg,#4a148c,#7b1fa2,#ab47bc); flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:200; text-align:center; padding:30px; }
    .end-trophy { font-size:4.5em; animation:trophySpin 1.5s ease-out; }
    @keyframes trophySpin { from{transform:rotate(-20deg) scale(0)} 60%{transform:rotate(10deg) scale(1.1)} to{transform:rotate(0) scale(1)} }
    .end-title  { color:#FFD700; font-size:clamp(1.5em,5vw,2.2em); font-weight:bold; text-shadow:0 3px 10px rgba(0,0,0,0.3); }
    .end-sub    { color:rgba(255,255,255,0.9); font-size:1.1em; }
    .end-score-box { background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.35); border-radius:20px; padding:16px 40px; color:white; font-size:1.8em; font-weight:bold; }
    .end-stars  { font-size:2.2em; letter-spacing:4px; }
    .btn-play-again { background:#FFD700; color:#333; border:none; padding:15px 45px; border-radius:40px; font-size:1.2em; font-family:inherit; font-weight:bold; cursor:pointer; box-shadow:0 6px 20px rgba(0,0,0,0.2); margin-top:8px; }

    @media (max-width: 768px) {
      .pattern-item { max-width: 80px; }
      .colour-btn { height: 58px; }
      .pattern-row { gap: 6px; }
      .shape-wrap { padding: 6px; border-radius: 12px; }
      .hdr-title { display: none; }
    }
    @media (max-width: 480px) {
      .pattern-item { max-width: 66px; }
      .colour-btn { height: 52px; border-radius: 14px; }
    }
  </style>
</head>
<body>

<div id="intro-screen" onclick="startGame()">
  <img id="intro-logo" src="assets/innovinelogo.png" alt="Innovine" onerror="this.style.display='none'">
</div>

<div id="toast"></div>

<div id="game-screen">
  <div class="hdr">
    <div class="hdr-score">⭐ <span id="score-val">0</span> / 12</div>
    <div class="hdr-title">Patterning</div>
    <button class="mute-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
  </div>
  <div class="progress-row">
    <span class="progress-label">Q <span id="q-num">1</span> / 12</span>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>
  </div>
  <div class="instruction">Colour the object to complete the pattern.</div>
  <div class="q-card">
    <div class="pattern-row" id="pattern-row"></div>
    <div class="colour-choices" id="colour-choices"></div>
  </div>
  <div class="bottom-row">
    <button class="btn-restart" onclick="restartGame()">🔄 &nbsp;Restart</button>
  </div>
</div>

<div id="end-screen">
  <div class="end-trophy">🏆</div>
  <div class="end-title">You have done a great job!</div>
  <div class="end-sub">You completed all 12 questions!</div>
  <div class="end-score-box">Score: &nbsp;<span id="final-score">0</span> / 12</div>
  <div class="end-stars" id="end-stars"></div>
  <button class="btn-play-again" onclick="restartGame()">▶ &nbsp;Play Again</button>
</div>

<script>
const COLOR_HEX = {
  'Orange': '#FF7700',
  'Purple': '#8E24AA',
  'Yellow': '#FFD700',
  'Green':  '#2E7D32',
  'Blue':   '#1565C0',
  'Red':    '#C62828',
  'Pink':   '#E91E8C',
  'Teal':   '#00897B',
};

function shapeSVG(shape, color, isEmpty) {
  const fill   = isEmpty ? '#ffffff' : COLOR_HEX[color];
  const stroke = isEmpty ? '#aaaaaa' : COLOR_HEX[color];
  const sw     = isEmpty ? 3 : 2;
  const SHAPES = {
    heart:    `<svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg"><path d="M50,80 C30,65 8,52 8,30 C8,15 18,5 33,5 C40,5 46,8 50,14 C54,8 60,5 67,5 C82,5 92,15 92,30 C92,52 70,65 50,80Z" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/></svg>`,
    balloon:  `<svg viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg"><ellipse cx="40" cy="40" rx="28" ry="33" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/><path d="M33,72 Q28,84 33,94 Q40,82 47,94 Q52,84 47,72" fill="${fill}" stroke="${stroke}" stroke-width="1.5"/><line x1="40" y1="94" x2="40" y2="108" stroke="#777" stroke-width="2"/></svg>`,
    star:     `<svg viewBox="0 0 100 95" xmlns="http://www.w3.org/2000/svg"><polygon points="50,5 61,35 95,35 68,57 79,91 50,70 21,91 32,57 5,35 39,35" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/></svg>`,
    circle:   `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="44" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/></svg>`,
    triangle: `<svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg"><polygon points="50,5 95,85 5,85" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/></svg>`,
    square:   `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="8" width="84" height="84" rx="10" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/></svg>`,
    diamond:  `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><polygon points="50,5 95,50 50,95 5,50" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/></svg>`,
    flag:     `<svg viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg"><rect x="14" y="5" width="5" height="90" fill="#555" rx="2"/><polygon points="19,8 68,22 19,44" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/></svg>`,
  };
  return SHAPES[shape] || SHAPES.circle;
}

const QUESTIONS = [
  { shape:'heart',    pattern:['Orange','Purple','Orange',null], answer:'Purple', choices:['Orange','Purple','Blue']   },
  { shape:'flag',     pattern:['Yellow','Green','Yellow',null],  answer:'Green',  choices:['Red','Yellow','Green']     },
  { shape:'balloon',  pattern:['Blue','Red','Blue',null],        answer:'Red',    choices:['Blue','Green','Red']       },
  { shape:'star',     pattern:['Red','Blue','Red',null],         answer:'Blue',   choices:['Yellow','Red','Blue']      },
  { shape:'circle',   pattern:['Green','Orange','Green',null],   answer:'Orange', choices:['Green','Orange','Purple']  },
  { shape:'triangle', pattern:['Purple','Yellow','Purple',null], answer:'Yellow', choices:['Purple','Yellow','Red']    },
  { shape:'square',   pattern:['Pink','Teal','Pink',null],       answer:'Teal',   choices:['Pink','Teal','Orange']     },
  { shape:'diamond',  pattern:['Red','Green','Red',null],        answer:'Green',  choices:['Red','Blue','Green']       },
  { shape:'heart',    pattern:['Blue','Yellow','Blue',null],     answer:'Yellow', choices:['Blue','Yellow','Red']      },
  { shape:'balloon',  pattern:['Purple','Orange','Purple',null], answer:'Orange', choices:['Purple','Orange','Green']  },
  { shape:'star',     pattern:['Green','Pink','Green',null],     answer:'Pink',   choices:['Teal','Green','Pink']      },
  { shape:'circle',   pattern:['Teal','Red','Teal',null],        answer:'Red',    choices:['Yellow','Teal','Red']      },
];

const TOTAL = QUESTIONS.length;
let curQ = 0, score = 0, attempts = 0, answered = false, muted = false;

const sndWrong = new Audio('assets/wrong.mp3');
const sndClaps = new Audio('assets/free_claps.mp3');

function unlockAudio() {
  [sndWrong, sndClaps].forEach(s => { s.play().catch(()=>{}); s.pause(); s.currentTime = 0; });
  document.removeEventListener('pointerdown', unlockAudio);
}
document.addEventListener('pointerdown', unlockAudio);

function play(s) { if (muted) return; s.currentTime = 0; s.play().catch(()=>{}); }

function speak(text) {
  sndClaps.pause(); sndClaps.currentTime = 0;
  if (!('speechSynthesis' in window) || muted) return;
  window.speechSynthesis.cancel();
  setTimeout(() => {
    if (muted) return;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US'; u.rate = 0.7; u.pitch = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const v = voices.find(v => v.lang.startsWith('en') && !v.name.includes('Google'))
           || voices.find(v => v.lang.startsWith('en')) || voices[0];
    if (v) u.voice = v;
    window.speechSynthesis.speak(u);
  }, 150);
}
window.speechSynthesis.getVoices();
window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());

function playClaps() {
  if (muted) return;
  sndClaps.currentTime = 0; sndClaps.play().catch(()=>{});
  setTimeout(() => { sndClaps.pause(); sndClaps.currentTime = 0; }, 3000);
}

function loadQuestion() {
  if (curQ >= TOTAL) { showEnd(); return; }
  answered = false; attempts = 0;

  const q = QUESTIONS[curQ];
  document.getElementById('q-num').textContent     = curQ + 1;
  document.getElementById('score-val').textContent = score;
  document.getElementById('prog-bar').style.width  = (curQ / TOTAL * 100) + '%';
  speak('Colour the object to complete the pattern.');

  const row = document.getElementById('pattern-row');
  row.innerHTML = '';
  q.pattern.forEach((color, idx) => {
    const isEmpty = color === null;
    const item    = document.createElement('div');
    item.className = 'pattern-item';
    const wrap    = document.createElement('div');
    wrap.className = 'shape-wrap' + (isEmpty ? ' empty' : '');
    if (isEmpty) wrap.id = 'empty-shape';
    wrap.innerHTML = shapeSVG(q.shape, color, isEmpty);
    item.appendChild(wrap);
    row.appendChild(item);
  });

  const choicesWrap = document.getElementById('colour-choices');
  choicesWrap.innerHTML = '';
  const shuffled = [...q.choices];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  shuffled.forEach(colour => {
    const btn = document.createElement('button');
    btn.className = 'colour-btn';
    btn.dataset.colour = colour;
    btn.style.background = COLOR_HEX[colour];
    btn.style.color = colour === 'Yellow' ? '#333' : 'white';
    btn.textContent = colour;
    btn.onclick = () => selectColour(colour);
    choicesWrap.appendChild(btn);
  });
}

function getBtn(colour) { return document.querySelector(`.colour-btn[data-colour="${colour}"]`); }
function clearBtnStates() { document.querySelectorAll('.colour-btn').forEach(b => b.className = 'colour-btn'); }

function selectColour(colour) {
  if (answered) return;
  if (colour === QUESTIONS[curQ].answer) registerCorrect(colour);
  else registerWrong(colour);
}

function registerCorrect(colour) {
  answered = true;
  clearBtnStates();
  getBtn(colour).classList.add('correct');
  const emptyWrap = document.getElementById('empty-shape');
  if (emptyWrap) {
    emptyWrap.classList.remove('empty');
    emptyWrap.innerHTML = shapeSVG(QUESTIONS[curQ].shape, colour, false);
    emptyWrap.classList.add('correct-anim');
  }
  score++;
  document.getElementById('score-val').textContent = score;
  window.speechSynthesis?.cancel();
  playClaps();
  showToast('⭐ Correct!', '#4CAF50');
  spawnConfetti();
  setTimeout(() => { curQ++; loadQuestion(); }, 3200);
}

function registerWrong(colour) {
  if (answered) return;
  attempts++;
  const wrongBtn   = getBtn(colour);
  const correctBtn = getBtn(QUESTIONS[curQ].answer);
  const emptyWrap  = document.getElementById('empty-shape');

  if (attempts === 1) {
    wrongBtn.classList.add('wrong');
    if (emptyWrap) { emptyWrap.classList.add('wrong-anim'); setTimeout(() => emptyWrap.classList.remove('wrong-anim'), 500); }
    play(sndWrong);
    showToast('❌ Try again!', '#f44336');
    setTimeout(() => {
      wrongBtn.classList.remove('wrong');
      if (!answered) correctBtn.classList.add('hint');
    }, 900);
  } else {
    answered = true;
    wrongBtn.classList.add('wrong');
    play(sndWrong);
    showToast('❌ Wrong!', '#f44336');
    setTimeout(() => {
      clearBtnStates();
      correctBtn.classList.add('correct');
      if (emptyWrap) {
        emptyWrap.classList.remove('empty');
        emptyWrap.innerHTML = shapeSVG(QUESTIONS[curQ].shape, QUESTIONS[curQ].answer, false);
        emptyWrap.classList.add('correct-anim');
      }
      showToast('💡 Correct answer!', '#FF9800');
      setTimeout(() => { curQ++; loadQuestion(); }, 3000);
    }, 1000);
  }
}

function startGame() {
  document.getElementById('intro-screen').style.display = 'none';
  document.getElementById('game-screen').style.display  = 'flex';
  curQ = 0; score = 0;
  loadQuestion();
}

function restartGame() {
  window.speechSynthesis?.cancel();
  document.getElementById('end-screen').style.display  = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  curQ = 0; score = 0; attempts = 0; answered = false;
  loadQuestion();
}

let toastTimer = null;
function showToast(msg, bg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.style.background = bg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1400);
}

const CC = ['#FFD700','#FF6B6B','#4CAF50','#2196F3','#FF9800','#AB47BC','#26C6DA'];
function spawnConfetti() {
  for (let i = 0; i < 70; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti';
      const sz = 6 + Math.random() * 9;
      el.style.cssText = `left:${Math.random()*100}vw;top:-12px;width:${sz}px;height:${sz}px;background:${CC[Math.floor(Math.random()*CC.length)]};border-radius:${Math.random()>.4?'50%':'2px'};animation:cfFall ${1.4+Math.random()*1.8}s linear forwards;`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 22);
  }
}
if (!document.querySelector('#cf-style')) {
  const s = document.createElement('style'); s.id = 'cf-style';
  s.textContent = `@keyframes cfFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(105vh) rotate(540deg);opacity:0}}`;
  document.head.appendChild(s);
}

function toggleMute() {
  muted = !muted;
  document.getElementById('mute-btn').textContent = muted ? '🔇' : '🔊';
  if (muted) { window.speechSynthesis?.cancel(); sndClaps.pause(); }
  else speak('Colour the object to complete the pattern.');
}

function showEnd() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('end-screen').style.display  = 'flex';
  document.getElementById('final-score').textContent   = score;
  document.getElementById('end-stars').textContent = score >= 10 ? '⭐⭐⭐' : score >= 7 ? '⭐⭐' : '⭐';
  window.speechSynthesis?.cancel(); playClaps(); spawnConfetti(); setTimeout(spawnConfetti, 800);
}
</script>
</body>
</html>
